services:
  - type: web
    name: care-mobility-dispatch-web-v2
    runtime: node
    rootDir: .
    plan: pro
    scaling:
      minInstances: 1
      maxInstances: 3
      targetMemoryPercent: 60
      targetCPUPercent: 60
    buildCommand: npm install ; npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_VERSION
        value: 20.19.0
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --expose-gc
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN
        sync: false
      - key: NEXT_PUBLIC_MAPBOX_STYLE_ID
        value: mapbox/streets-v12
      - key: CRON_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: LICENSE_WARNING_DAYS
        value: "30"

  - type: cron
    name: care-mobility-license-check
    runtime: node
    schedule: "0 8 * * *"
    buildCommand: npm install ; npm run build
    startCommand: >
      node -e "
        fetch(process.env.NEXTAUTH_URL + '/api/cron/license-check', {
          headers: { 'x-cron-secret': process.env.CRON_SECRET || '' }
        }).then(r => r.json()).then(d => { console.log(JSON.stringify(d)); process.exit(0); })
          .catch(e => { console.error(e.message); process.exit(1); })
      "
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: LICENSE_WARNING_DAYS
        value: "30"