services:
  - type: web
    name: care-mobility-dispatch
    runtime: node
    rootDir: .
    plan: starter
    buildCommand: npm install ; npm run build
    startCommand: npm run start
    healthCheckPath: /auth/login
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: "--max-old-space-size=400"
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: STORAGE_ROOT
        value: /var/data/care-mobility/storage
      - key: NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN
        sync: false
      - key: NEXT_PUBLIC_MAPBOX_STYLE_ID
        value: mapbox/streets-v12
      - key: CRON_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: LICENSE_WARNING_DAYS
        value: "30"
      - key: DATABASE_URL
        sync: false
    disk:
      name: care-mobility-storage
      mountPath: /var/data/care-mobility
      sizeGB: 50

  - type: cron
    name: care-mobility-license-check
    runtime: node
    schedule: "0 8 * * *"
    buildCommand: npm install ; npm run build
    startCommand: >
      node -e "
        fetch(process.env.NEXTAUTH_URL + '/api/cron/license-check', {
          headers: { 'x-cron-secret': process.env.CRON_SECRET || '' }
        }).then(r => r.json()).then(d => { console.log(JSON.stringify(d)); process.exit(0); })
          .catch(e => { console.error(e.message); process.exit(1); })
      "
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: LICENSE_WARNING_DAYS
        value: "30"
      - key: DATABASE_URL
        sync: false

  - type: cron
    name: care-mobility-dispatch-history-archive
    runtime: node
    schedule: "0 4,5 * * *"
    buildCommand: npm install ; npm run build
    startCommand: >
      node -e "
        fetch(process.env.NEXTAUTH_URL + '/api/cron/dispatch-history-archive', {
          headers: { 'x-cron-secret': process.env.CRON_SECRET || '' }
        }).then(r => r.json()).then(d => { console.log(JSON.stringify(d)); process.exit(0); })
          .catch(e => { console.error(e.message); process.exit(1); })
      "
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: DATABASE_URL
        sync: false